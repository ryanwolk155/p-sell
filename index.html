<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Carregando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#0f0f0f;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.container{
  width:100%;
  max-width:420px;
  text-align:center;
  background:#1a1a1a;
  padding:28px;
  border-radius:18px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}
h1{
  font-size:24px;
  margin-bottom:14px;
}
p{
  opacity:.9;
  margin-bottom:18px;
  line-height:1.5;
}
.bar{
  width:100%;
  height:14px;
  background:#333;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:14px;
}
.fill{
  height:100%;
  width:0%;
  background:#25D366;
  transition:width .25s linear;
}
.percent{
  font-size:18px;
  font-weight:bold;
  margin-bottom:18px;
}
button{
  width:100%;
  border:none;
  padding:16px;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
  background:#25D366;
  color:#fff;
  cursor:pointer;
}
small{
  display:block;
  margin-top:14px;
  opacity:.7;
}
</style>
</head>
<body>

<div class="container">
  <h1>Preparando seu acesso...</h1>
  <p>Aguarde enquanto abrimos seu atendimento no WhatsApp.</p>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="percent" id="percent">0%</div>

  <button id="btn" onclick="goWhats()" style="display:none;">
    ABRIR WHATSAPP
  </button>

  <small>Se não abrir automático, toque no botão.</small>
</div>

<script>
const numero = "15559064249"; // TROQUE AQUI
const msg = encodeURIComponent("Oi, vim pelo TikTok e quero atendimento.");

const wa = `https://wa.me/${numero}?text=${msg}`;
const intent = `intent://send?phone=${numero}#Intent;scheme=smsto;package=com.whatsapp;end`;

let p = 0;
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const btn = document.getElementById("btn");

const timer = setInterval(()=>{
  p += 4;
  fill.style.width = p + "%";
  percent.innerText = p + "%";

  if(p >= 100){
    clearInterval(timer);
    btn.style.display = "block";
    autoOpen();
  }
},120);

function autoOpen(){
  // Android tenta abrir app externo
  if(/Android/i.test(navigator.userAgent)){
    window.location.href = intent;

    setTimeout(()=>{
      window.location.href = wa;
    },1200);

  }else{
    // iPhone e outros
    window.location.href = wa;
  }
}

function goWhats(){
  autoOpen();
}
</script>

</body>
</html>
