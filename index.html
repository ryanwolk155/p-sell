<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrindo WhatsApp...</title>

<script>
const LINK_FINAL = "https://wa.me/15559064249?text=Oii%20Nayara%2C%20te%20vi%20no%20tiktok%20e%20quero%20comprar%20seus%20conte%C3%BAdos!";

function sairTikTok() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(ua)) {

        window.location.href =
        "intent://" + LINK_FINAL.replace("https://", "").replace("http://", "") +
        "#Intent;scheme=https;package=com.android.chrome;end";

        setTimeout(() => {
            window.location.href = LINK_FINAL;
        }, 1500);

    } else if (/iPhone|iPad|iPod/i.test(ua)) {

        window.location.href = LINK_FINAL;

        setTimeout(() => {
            window.open(LINK_FINAL, "_blank");
        }, 800);

    } else {
        window.open(LINK_FINAL, "_blank");
    }
}

window.onload = function() {
    setTimeout(() => {
        sairTikTok();
    }, 500);
};
</script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}
.box{
max-width:400px;
}
button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#25D366;
color:#fff;
cursor:pointer;
width:100%;
}
h1{
font-size:28px;
margin-bottom:10px;
}
p{
opacity:.9;
line-height:1.5;
}
</style>
</head>

<body>

<div class="box">
<h1>Abrindo WhatsApp...</h1>
<p>Se não abrir automaticamente, clique abaixo.</p>

<button onclick="sairTikTok()">
ABRIR AGORA
</button>
</div>

</body>
</html>
