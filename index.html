<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Abrindo...</title>

<script>
const WHATS =
"https://wa.me/15559064249?text=Oii%20Nayara%2C%20te%20vi%20no%20tiktok%20e%20quero%20comprar%20seus%20conte%C3%BAdos!";

function abrirExterno() {

    const ua = navigator.userAgent.toLowerCase();

    // ANDROID (melhor método)
    if (ua.includes("android")) {

        const chromeIntent =
        "intent://wa.me/15559064249?text=Oii%20Nayara%2C%20te%20vi%20no%20tiktok%20e%20quero%20comprar%20seus%20conte%C3%BAdos!" +
        "#Intent;scheme=https;package=com.android.chrome;end";

        window.location = chromeIntent;

        setTimeout(() => {
            window.location = WHATS;
        }, 1200);
    }

    // IPHONE
    else {

        window.open(WHATS, "_blank");

        setTimeout(() => {
            window.location = WHATS;
        }, 800);
    }
}

window.onload = function(){
    setTimeout(()=>{
        abrirExterno();
    },300);
};
</script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}
.box{
max-width:420px;
}
button{
width:100%;
padding:18px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:14px;
background:#25D366;
color:#fff;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
<h1>Abrindo navegador externo...</h1>
<p>Se não abrir sozinho, toque abaixo:</p>

<button onclick="abrirExterno()">
ABRIR WHATSAPP
</button>
</div>

</body>
</html>
